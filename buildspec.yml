version: 0.2
phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 533267311092.dkr.ecr.us-east-1.amazonaws.com
  build:
    commands:
      - docker build -t $ImageName -f ./Dockerfile .
      - docker images
  post_build:
    commands:
      - docker tag $ImageName:latest 533267311092.dkr.ecr.us-east-1.amazonaws.com/$ImageName:latest
      - docker push 533267311092.dkr.ecr.us-east-1.amazonaws.com/$ImageName:latest

artifacts:
  files:
    - appspec.yml
    - scripts/*
