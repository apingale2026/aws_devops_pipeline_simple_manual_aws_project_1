version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 533267311092.dkr.ecr.us-east-1.amazonaws.com
      - IMAGE_NAME=mypythonapp   
  build:
    commands:
      - echo "Building Docker image..."
      - docker buildx create --use
      - docker buildx build --platform linux/arm64 -t 533267311092.dkr.ecr.us-east-1.amazonaws.com/mypythonapp:latest 
      - docker images
  post_build:
    commands:
      - echo "Tagging and pushing image to ECR..."
      - docker tag $IMAGE_NAME:latest 533267311092.dkr.ecr.us-east-1.amazonaws.com/$IMAGE_NAME:latest
      - docker buildx build --platform linux/arm64 -t 533267311092.dkr.ecr.us-east-1.amazonaws.com/mypythonapp:latest --push .

artifacts:
  files:
    - appspec.yml
    - scripts/*
